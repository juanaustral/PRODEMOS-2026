<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRODEMOS OTRA VEZ — Ranking</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Geist','Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#07070a;color:#e4e4e7;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 25%,rgba(20,80,160,.06),transparent),radial-gradient(ellipse 60% 40% at 85% 75%,rgba(180,40,40,.05),transparent),radial-gradient(ellipse 50% 60% at 50% 50%,rgba(255,200,50,.03),transparent);pointer-events:none;z-index:0}

/* ── Floating cups ── */
.floating-cups{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.floating-cup{position:absolute;opacity:.035;animation:floatCup 20s ease-in-out infinite;object-fit:contain;filter:brightness(1.2) drop-shadow(0 0 8px rgba(251,191,36,.08))}
.cup-1{top:3%;left:2%;width:65px;animation-delay:0s;animation-duration:25s}
.cup-2{top:55%;right:3%;width:50px;animation-delay:-7s;animation-duration:22s}
.cup-3{bottom:5%;left:8%;width:40px;animation-delay:-14s;animation-duration:28s}
@keyframes floatCup{0%,100%{transform:translateY(0)rotate(0deg)}33%{transform:translateY(-14px)rotate(2deg)}66%{transform:translateY(-6px)rotate(-1.5deg)}}

.container{max-width:800px;margin:0 auto;padding:30px 16px;position:relative;z-index:1}

/* ── Header ── */
.header{text-align:center;margin-bottom:32px;animation:fadeDown .7s ease-out}
.header h1{font-size:24px;font-weight:900;letter-spacing:-.5px;background:linear-gradient(135deg,#fbbf24 0%,#f59e0b 30%,#fcd34d 60%,#fbbf24 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;margin-bottom:6px}
.header .sub{color:#a0a0b0;font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase}

/* ── Back button ── */
.back-bar{margin-bottom:20px}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:#a0a0b0;text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.06);transition:all .2s}
.back-btn:hover{color:#e4e4e7;border-color:rgba(255,255,255,.1);background:rgba(255,255,255,.02)}

/* ── Ranking card ── */
.rank-card{background:rgba(18,18,22,.3);border:1px solid rgba(255,255,255,.04);border-radius:20px;padding:24px;animation:fadeUp .6s ease-out}
.rank-card-title{text-align:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.04)}
.rank-card-title h2{font-size:16px;font-weight:700;color:#e4e4e7}
.rank-card-title .date{font-size:11px;color:#a0a0b0;margin-top:2px}

/* ── Ranking table ── */
.rank-table{width:100%;border-collapse:collapse}
.rank-table th{padding:8px 12px;font-size:10px;font-weight:600;color:#a0a0b0;text-transform:uppercase;letter-spacing:1.5px;text-align:left;border-bottom:1px solid rgba(255,255,255,.04)}
.rank-table th:last-child,.rank-table td:last-child{text-align:right}
.rank-table tr{transition:background .15s}
.rank-table tbody tr:hover{background:rgba(255,255,255,.02)}
.rank-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.03)}
.rank-table .pos{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:#a0a0b0;width:36px}
.rank-table .pos.gold{color:#fbbf24}.rank-table .pos.silver{color:#a0a0b0}.rank-table .pos.bronze{color:#cd7f32}
.rank-table .name{font-weight:500;color:#e4e4e7}
.rank-table .pts{font-family:'JetBrains Mono',monospace;font-weight:700;color:#a78bfa;font-size:14px;text-align:right}
.rank-table .medal{font-size:14px;width:24px;text-align:center}

@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:600px){
  .container{padding:20px 12px}
  .header h1{font-size:20px}
  .rank-card{padding:16px;border-radius:14px}
  .rank-table td{padding:8px 8px;font-size:12px}
}
</style>
</head>
<body>

<div class="floating-cups">
  <img class="floating-cup cup-1" src="trophy.png" alt="">
  <img class="floating-cup cup-2" src="trophy.png" alt="">
  <img class="floating-cup cup-3" src="ball.png" alt="">
</div>

<div class="container">

  <div class="back-bar">
    <a class="back-btn" href="index.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
      Volver al inicio
    </a>
  </div>

  <div class="header">
    <h1>PRODEMOS OTRA VEZ ?</h1>
    <div class="sub">Torneo de amigos &middot; ProdeCA &middot; Ranking general</div>
  </div>

  <div class="rank-card">
    <div class="rank-card-title">
      <h2>Clasificaci&oacute;n</h2>
      <div class="date">Actualizado al &uacute;ltimo partido</div>
    </div>
    <table class="rank-table">
      <thead>
        <tr>
          <th></th>
          <th>Pos</th>
          <th>Participante</th>
          <th>Pts</th>
        </tr>
      </thead>
      <tbody id="rankBody">
      </tbody>
    </table>
  </div>

</div>

<script>
const RANKING = [
  { pos:  1, name: "Martin Baigorria",              pts: 34 },
  { pos:  2, name: "Luis Duprat",                   pts: 33 },
  { pos:  2, name: "Miguel M",                      pts: 33 },
  { pos:  4, name: "Gabriela Monaco",               pts: 32 },
  { pos:  4, name: "Noly Moreno",                   pts: 32 },
  { pos:  6, name: "Karen Elizondo",                pts: 29 },
  { pos:  6, name: "Ruben777",                      pts: 29 },
  { pos:  8, name: "Carlos Sarmiento",              pts: 28 },
  { pos:  8, name: "Esther M. Ribeiro",             pts: 28 },
  { pos:  8, name: "Rodrigo Tumbarello",            pts: 28 },
  { pos: 11, name: "Mauricio Moreno",               pts: 27 },
  { pos: 12, name: "Florencia Escortichini",        pts: 26 },
  { pos: 12, name: "Gabriel Moreno",                pts: 26 },
  { pos: 14, name: "Juan Martinez Garcia",          pts: 24 },
  { pos: 15, name: "Florencia",                     pts: 23 },
  { pos: 15, name: "Juan Manuel Lucero",            pts: 23 },
  { pos: 17, name: "Gerardo De Marco",              pts: 22 },
  { pos: 17, name: "Guille Calde",                  pts: 22 },
  { pos: 19, name: "Lucas Bejarano",                pts: 21 },
  { pos: 19, name: "Maximiliano Ruiz Diaz",         pts: 21 },
  { pos: 21, name: "Gustavo Pereyra",               pts: 20 },
  { pos: 22, name: "Franco Pellegrino",             pts: 18 },
  { pos: 22, name: "elmasternero",                  pts: 18 },
  { pos: 24, name: "Cristian Ochoa",                pts: 12 },
];

const medals = { 1: '\u{1F947}', 2: '\u{1F948}', 3: '\u{1F949}' };
const body = document.getElementById('rankBody');
body.innerHTML = RANKING.map(r => {
  const self = '';
  const medal = medals[r.pos] || '';
  const posClass = r.pos === 1 ? 'gold' : r.pos === 2 ? 'silver' : r.pos === 3 ? 'bronze' : '';
  return `<tr${self}><td class="medal">${medal}</td><td class="pos ${posClass}">${r.pos}</td><td class="name">${r.name}</td><td class="pts">${r.pts}</td></tr>`;
}).join('');
</script>

</body>
</html>
